name: ecosystem_tracker
description: 路亚生态研究追踪 App - 出勤记录、GPS 标记、鱼货拍照、天气潮汐
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理与导航
  go_router: ^13.0.0
  provider: ^6.1.1

  # 网络请求
  http: ^1.2.0

  # 图片与相机
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # 定位与地图
  geolocator: ^11.0.0
  amap_flutter_map: ^3.1.0
  amap_flutter_location: ^3.2.0

  # 本地存储
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.9.0

  # UI 组件
  flutter_native_splash: ^2.3.9
  intl: ^0.19.0
  permission_handler: ^11.3.0

  # 微信登录（可选）
 fluwx: ^4.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
