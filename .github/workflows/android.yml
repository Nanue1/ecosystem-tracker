name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('mobile/pubspec.lock') }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache/hosted/pub.dev/
          key: pub-${{ runner.os }}-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Generate Android native project
        run: |
          cd mobile
          flutter create --platforms=android .

          # NOTE: flutter create RE-GENERATES android/settings.gradle, so we patch AFTER.
          # Override Kotlin plugin version from ~1.7.10 to 1.9.22.
          sed -i 's/id("org.jetbrains.kotlin.android") version "[^"]*"/id("org.jetbrains.kotlin.android") version "1.9.22"/' android/settings.gradle

          # Also patch android/app/build.gradle to add kotlin-stdlib resolution force.
          # This fixes "Module compiled with incompatible Kotlin metadata" error where
          # kotlin-stdlib 1.9.0 metadata is incompatible with Kotlin plugin 1.7.x.
          python3 -c "
          import re
          gradle = open('android/app/build.gradle').read()
          if 'kotlin-stdlib.*1.9.22' not in gradle:
              # Insert resolutionStrategy before the android { block or subprojects
              patch = '''

configurations.all {
    resolutionStrategy {
        force \"org.jetbrains.kotlin:kotlin-stdlib:1.9.22\"
        force \"org.jetbrains.kotlin:kotlin-stdlib-common:1.9.22\"
        force \"org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22\"
        force \"org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22\"
    }
}

'''
              if 'android {' in gradle:
                  gradle = gradle.replace('android {', patch + 'android {')
              open('android/app/build.gradle', 'w').write(gradle)
              print('Patched android/app/build.gradle with kotlin-stdlib resolutionStrategy')
          else:
              print('kotlin-stdlib resolutionStrategy already present')
          "

          cd ..

      - name: Get Flutter dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Accept Android licenses
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          if [ ! -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
            curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdtools.zip
            unzip -q /tmp/cmdtools.zip -d $ANDROID_HOME/cmdline-tools
            mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          fi
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Build debug APK
        working-directory: mobile
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Build release APK
        working-directory: mobile
        run: flutter build apk --release

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
