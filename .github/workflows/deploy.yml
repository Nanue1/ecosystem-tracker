name: Deploy Mini Program

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Write private key
        run: |
          echo "${{ secrets.WX_PRIVATE_KEY }}" > /tmp/private.key
          chmod 600 /tmp/private.key
          echo "Key file size: $(wc -c < /tmp/private.key) bytes"
          echo "Key starts with: $(head -1 /tmp/private.key)"
          echo "Key ends with: $(tail -1 /tmp/private.key)"

      - name: Upload to WeChat
        run: |
          cd frontend
          npx miniprogram-ci upload \
            --appid ${{ secrets.WX_APPID }} \
            --private-key-path /tmp/private.key \
            --private-key-type rsa \
            --project-path . \
            --upload-version 1.0.0 \
            --upload-description "Auto deploy via GitHub Actions"
