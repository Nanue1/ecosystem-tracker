name: Deploy Mini Program

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GH_ACTIONS_SSH_KEY }}" > ~/.ssh/github_actions_key
          chmod 600 ~/.ssh/github_actions_key
          ssh-keyscan -H 34.92.70.58 >> ~/.ssh/known_hosts 2>/dev/null
          echo "Known hosts updated"

      - name: Upload via SSH
        env:
          VERSION: ${{ github.run_number }}.${{ github.run_attempt }}
        run: |
          cd frontend
          tar czf - . | ssh -i ~/.ssh/github_actions_key \
            -o StrictHostKeyChecking=no \
            manue1@34.92.70.58 \
            "/home/manue1/hermes_project/projects/ecosystem-tracker/scripts/github-upload.sh $VERSION 'Auto deploy via GitHub Actions'"
