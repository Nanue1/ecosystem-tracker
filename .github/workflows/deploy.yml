name: Deploy Mini Program

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Write private key
        run: |
          echo "${{ secrets.WX_PRIVATE_KEY }}" > /tmp/private.key
          chmod 600 /tmp/private.key

      - name: Upload to WeChat
        run: |
          cd frontend
          npx miniprogram-ci upload \
            --appid ${{ secrets.WX_APPID }} \
            --private-key-path /tmp/private.key \
            --project ./project.config.json \
            --output-dir ./dist
